<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reel Deal — Fishing Tournaments</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0B2438;
    --navy-panel:#12374F;
    --navy-panel-2:#183F59;
    --cream:#EFE6CF;
    --cream-dim:#B9C3C9;
    --dock-green:#2F8F6E;
    --bobber-orange:#E1602A;
    --sunrise-gold:#F0A94E;
    --line-hair:rgba(239,230,207,0.14);
    --danger:#D9553F;
    --radius:10px;
    --shadow:0 12px 30px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 500px at 15% -10%, rgba(47,143,110,0.18), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(225,96,42,0.10), transparent 55%),
      var(--navy-deep);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    line-height:1.5;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--bobber-orange);color:var(--navy-deep);}

  #app{max-width:1040px;margin:0 auto;padding:0 20px 80px;}
  header.top{
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 0 18px;border-bottom:1px solid var(--line-hair);
    margin-bottom:28px;flex-wrap:wrap;gap:14px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{
    width:40px;height:40px;border-radius:8px;
    background:linear-gradient(155deg,var(--dock-green),var(--navy-panel-2));
    display:flex;align-items:center;justify-content:center;
    font-size:20px;border:1px solid var(--line-hair);
  }
  .brand h1{font-size:22px;margin:0;color:var(--cream);}
  .brand .tag{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--cream-dim);margin-top:1px;}
  nav.crumbs{font-size:13px;color:var(--cream-dim);margin-bottom:18px;}
  nav.crumbs button{background:none;border:none;color:var(--sunrise-gold);padding:0;font-size:13px;text-decoration:underline;text-underline-offset:3px;}
  nav.crumbs button:hover{color:var(--cream);}

  .who{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--cream-dim);}
  .who input{
    background:var(--navy-panel);border:1px solid var(--line-hair);color:var(--cream);
    border-radius:7px;padding:7px 10px;font-family:inherit;font-size:13px;width:150px;
  }
  .who input:focus{outline:2px solid var(--dock-green);outline-offset:1px;}
  .api-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:var(--cream-dim);}
  .api-dot.ok{background:var(--dock-green);}
  .api-dot.bad{background:var(--danger);}

  .btn{
    display:inline-flex;align-items:center;gap:7px;
    padding:10px 18px;border-radius:8px;border:1px solid transparent;
    font-weight:600;font-size:14px;transition:transform .12s ease, filter .12s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--bobber-orange);color:#231206;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent;border-color:var(--line-hair);color:var(--cream);}
  .btn-ghost:hover{border-color:var(--sunrise-gold);color:var(--sunrise-gold);}
  .btn-green{background:var(--dock-green);color:#052018;}
  .btn-green:hover{filter:brightness(1.1);}
  .btn-danger{background:transparent;color:var(--danger);border-color:rgba(217,85,63,0.5);}
  .btn-danger:hover{background:rgba(217,85,63,0.12);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-block{width:100%;justify-content:center;}
  .btn:focus-visible{outline:2px solid var(--sunrise-gold);outline-offset:2px;}

  .panel{background:var(--navy-panel);border:1px solid var(--line-hair);border-radius:var(--radius);padding:22px;}
  .card{background:var(--navy-panel);border:1px solid var(--line-hair);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:border-color .15s ease;}
  .card:hover{border-color:rgba(240,169,78,0.35);}
  .grid-comps{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

  .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:4px 10px;border-radius:100px;font-family:'IBM Plex Mono',monospace;}
  .status-open{background:rgba(47,143,110,0.18);color:#7FDCB6;border:1px solid rgba(47,143,110,0.4);}
  .status-ended{background:rgba(185,195,201,0.12);color:var(--cream-dim);border:1px solid var(--line-hair);}

  .comp-title{font-size:19px;margin:10px 0 6px;}
  .comp-meta{font-size:12.5px;color:var(--cream-dim);display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;font-family:'IBM Plex Mono',monospace;}
  .comp-desc{font-size:13.5px;color:var(--cream-dim);margin-bottom:14px;}

  label{display:block;font-size:12.5px;color:var(--cream-dim);margin-bottom:6px;font-weight:600;letter-spacing:0.02em;}
  input[type=text],input[type=number],input[type=date],input[type=file],textarea,select{
    width:100%;background:var(--navy-deep);border:1px solid var(--line-hair);color:var(--cream);
    border-radius:7px;padding:10px 12px;font-family:inherit;font-size:14px;margin-bottom:16px;
  }
  textarea{resize:vertical;min-height:80px;}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--dock-green);outline-offset:1px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .hint{font-size:11.5px;color:var(--cream-dim);margin-top:-12px;margin-bottom:16px;}
  .error-text{font-size:12.5px;color:var(--danger);margin:-10px 0 14px;}

  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:20px;}
  .section-title{font-size:15px;text-transform:uppercase;letter-spacing:0.08em;color:var(--sunrise-gold);margin:34px 0 14px;font-family:'IBM Plex Mono',monospace;}
  .section-title:first-of-type{margin-top:0;}

  .announcement{background:linear-gradient(120deg, rgba(225,96,42,0.16), rgba(240,169,78,0.08));border:1px solid rgba(240,169,78,0.4);border-radius:var(--radius);padding:20px;margin-bottom:24px;}
  .announcement h3{margin:0 0 6px;color:var(--sunrise-gold);font-size:18px;}
  .announcement p{margin:0;font-size:14px;color:var(--cream);}

  .leaderboard{width:100%;border-collapse:collapse;font-size:14px;}
  .leaderboard th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:var(--cream-dim);padding:8px 10px;border-bottom:1px solid var(--line-hair);}
  .leaderboard td{padding:10px;border-bottom:1px solid var(--line-hair);}
  .leaderboard tr:last-child td{border-bottom:none;}
  .rank{font-family:'IBM Plex Mono',monospace;color:var(--sunrise-gold);font-weight:600;}
  .rank.gold{color:#FFD65C;}
  .leaderboard img{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--line-hair);}
  .len-val{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--cream);}

  .participants-list{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{background:var(--navy-deep);border:1px solid var(--line-hair);border-radius:100px;padding:6px 12px;font-size:12.5px;color:var(--cream-dim);font-family:'IBM Plex Mono',monospace;}

  .measure-wrap{display:flex;gap:22px;flex-wrap:wrap;}
  .measure-canvas-col{flex:1 1 380px;}
  .measure-side{flex:1 1 260px;min-width:240px;}
  canvas#fishCanvas{width:100%;height:auto;border-radius:8px;border:1px solid var(--line-hair);background:var(--navy-deep);cursor:crosshair;display:block;}
  .step-list{list-style:none;margin:0 0 18px;padding:0;font-size:13px;}
  .step-list li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line-hair);color:var(--cream-dim);}
  .step-list li:last-child{border-bottom:none;}
  .step-list li.active{color:var(--cream);}
  .step-num{flex:none;width:20px;height:20px;border-radius:50%;background:var(--navy-deep);border:1px solid var(--line-hair);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--cream-dim);}
  .step-list li.active .step-num{background:var(--dock-green);border-color:var(--dock-green);color:#052018;}
  .step-list li.done .step-num{background:var(--sunrise-gold);border-color:var(--sunrise-gold);color:#231206;}

  .result-box{background:var(--navy-deep);border:1px dashed var(--sunrise-gold);border-radius:8px;padding:16px;text-align:center;margin-bottom:16px;}
  .result-box .num{font-family:'IBM Plex Mono',monospace;font-size:32px;color:var(--sunrise-gold);font-weight:600;}
  .result-box .lbl{font-size:11px;color:var(--cream-dim);text-transform:uppercase;letter-spacing:0.08em;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--cream-dim);}
  .empty-state .big{font-size:40px;margin-bottom:10px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dock-green);color:#052018;padding:12px 22px;border-radius:8px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);z-index:50;animation:toastIn .2s ease;}
  .toast.err{background:var(--danger);color:#2a0d08;}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}

  footer.note{margin-top:50px;padding-top:18px;border-top:1px solid var(--line-hair);font-size:11.5px;color:var(--cream-dim);}
  @media(max-width:640px){.row2{grid-template-columns:1fr;}.detail-head{flex-direction:column;}}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ====================================================================
   CONFIGURE THIS before uploading to Neocities (or any static host):
   point it at your deployed backend, e.g. a Render/Railway/PythonAnywhere
   URL. No trailing slash. Leave as '' only when the frontend and backend
   are served from the very same origin (e.g. testing locally with
   `python app.py`, which serves this file itself).
==================================================================== */
const API = 'https://onlinefishingapp.onrender.com';
/* ==================================================================== */

/* ---------- tiny fetch helpers ---------- */
async function apiGet(path){
  const r = await fetch(API+path);
  if(!r.ok) throw new Error((await r.json().catch(()=>({error:r.statusText}))).error || 'Request failed');
  return r.json();
}
async function apiPost(path, body){
  const r = await fetch(API+path, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}
async function apiPostForm(path, formData){
  const r = await fetch(API+path, {method:'POST', body: formData});
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d.length>10 ? d : d+'T00:00:00'); return dt.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- app state ---------- */
let state = { view:'list', compId:null, myName: localStorage.getItem('reeldeal-name') || '', toast:null, apiOk:null };
let measure = { points:[], refLength:6, canvasEl:null, imgDataUrl:null, computedLength:null };

function showToast(msg, isErr){ state.toast = {msg, isErr}; render(); setTimeout(()=>{ state.toast=null; render(); }, 3200); }
function saveMyName(n){ state.myName = n; localStorage.setItem('reeldeal-name', n); }

async function init(){
  try{ await apiGet('/api/whoami'); state.apiOk = true; } catch(e){ state.apiOk = false; }
  render();
}

/* ---------- render router ---------- */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = headerHtml() + toastHtml();
  attachHeaderEvents();
  if(state.apiOk === false){
    document.getElementById('viewRoot').innerHTML = `<div class="empty-state panel">
      <div class="big">⚠️</div>
      <p><strong>Can't reach the backend API</strong> at <span class="mono">${escapeHtml(API)}</span>.<br>
      Check that: the backend is deployed and running, the <span class="mono">API</span> constant at the top of this file's script points at the right URL, and the backend's <span class="mono">CORS_ORIGINS</span> setting includes this site's origin (<span class="mono">${escapeHtml(location.origin)}</span>).</p>
    </div>`;
    return;
  }
  if(state.view==='list') renderList();
  else if(state.view==='create') renderCreate();
  else if(state.view==='detail') renderDetail();
}

function headerHtml(){
  return `
  <header class="top">
    <div class="brand">
      <div class="mark">🎣</div>
      <div><h1>Reel Deal</h1><div class="tag">Tournament board</div></div>
    </div>
    <div class="who">
      <span><span class="api-dot ${state.apiOk===true?'ok':state.apiOk===false?'bad':''}"></span>API</span>
      <span>Fishing as</span>
      <input id="nameInput" type="text" placeholder="your name" value="${escapeHtml(state.myName)}">
    </div>
  </header>
  <nav class="crumbs">
    <button id="crumbHome">All competitions</button>
    ${state.view!=='list' ? ' / ' + (state.view==='create' ? 'New competition' : 'Competition') : ''}
  </nav>
  <div id="viewRoot"></div>
  `;
}
function toastHtml(){
  if(!state.toast) return '';
  return `<div class="toast ${state.toast.isErr?'err':''}">${escapeHtml(state.toast.msg)}</div>`;
}
function attachHeaderEvents(){
  document.getElementById('crumbHome').onclick = ()=>{ state.view='list'; state.compId=null; render(); };
  const ni = document.getElementById('nameInput');
  ni.onchange = ()=> saveMyName(ni.value.trim());
}

/* ---------- LIST ---------- */
async function renderList(){
  const root = document.getElementById('viewRoot');
  root.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
    <h2 style="margin:0;font-size:26px;">Open water, open entries</h2>
    <button class="btn btn-primary" id="newCompBtn">＋ Post a competition</button>
  </div>
  <div id="listBody">Loading…</div>`;
  document.getElementById('newCompBtn').onclick = ()=>{ state.view='create'; render(); };

  let list;
  try{ list = await apiGet('/api/competitions'); }
  catch(e){ document.getElementById('listBody').innerHTML = `<div class="empty-state panel">Couldn't load competitions: ${escapeHtml(e.message)}</div>`; return; }

  const listBody = document.getElementById('listBody');
  if(list.length===0){
    listBody.innerHTML = `<div class="empty-state panel"><div class="big">🪝</div><p>No competitions yet. Be the first to cast one out.</p></div>`;
    return;
  }
  list.sort((a,b)=> (a.status==='open'?0:1)-(b.status==='open'?0:1) || new Date(a.endDate)-new Date(b.endDate));
  listBody.innerHTML = `<div class="grid-comps">${list.map(c=>`
    <div class="card comp-card" data-id="${c.id}" style="cursor:pointer;">
      <span class="status-pill ${c.status==='open'?'status-open':'status-ended'}">${c.status==='open'?'● Open':'Ended'}</span>
      <div class="comp-title">${escapeHtml(c.title)}</div>
      <div class="comp-meta"><span>🐟 ${escapeHtml(c.species||'Any species')}</span><span>📍 ${escapeHtml(c.waterBody||'—')}</span></div>
      <div class="comp-meta"><span>${fmtDate(c.startDate)} → ${fmtDate(c.endDate)}</span></div>
      <div class="comp-meta"><span>${c.participantCount} angler${c.participantCount===1?'':'s'}</span><span>${c.entryCount} catch${c.entryCount===1?'':'es'} logged</span></div>
    </div>`).join('')}</div>`;
  listBody.querySelectorAll('.comp-card').forEach(el=>{
    el.onclick = ()=>{ state.view='detail'; state.compId=el.dataset.id; render(); };
  });
}

/* ---------- CREATE ---------- */
function renderCreate(){
  const root = document.getElementById('viewRoot');
  root.innerHTML = `
  <div class="panel" style="max-width:640px;">
    <h2 style="margin-top:0;">Post a new competition</h2>
    <label for="cTitle">Competition name</label>
    <input id="cTitle" type="text" placeholder="e.g. Autumn Bass Classic">
    <div class="row2">
      <div><label for="cSpecies">Target species</label><input id="cSpecies" type="text" placeholder="e.g. Largemouth Bass"></div>
      <div><label for="cWater">Water body</label><input id="cWater" type="text" placeholder="e.g. Lake Ronkonkoma"></div>
    </div>
    <label for="cDesc">Details</label>
    <textarea id="cDesc" placeholder="Format, prizes, meetup point..."></textarea>
    <label for="cRules">Rules</label>
    <textarea id="cRules" placeholder="Catch and release, one entry per angler, photo must show full fish next to ruler..."></textarea>
    <div class="row2">
      <div><label for="cStart">Start date</label><input id="cStart" type="date" value="${todayISO()}"></div>
      <div><label for="cEnd">End date</label><input id="cEnd" type="date"></div>
    </div>
    <label for="cOrganizer">Your name (organizer)</label>
    <input id="cOrganizer" type="text" value="${escapeHtml(state.myName)}" placeholder="who's running this?">
    <div class="hint">Only the organizer can close the competition and post the winner.</div>
    <div class="row2">
      <div><label for="cRefLabel">Ruler reference label</label><input id="cRefLabel" type="text" value="6 inch mark" placeholder="e.g. 6 inch mark"></div>
      <div><label for="cUnit">Measurement unit</label><select id="cUnit"><option value="in">inches</option><option value="cm">centimeters</option></select></div>
    </div>
    <div class="hint">Shown to anglers when they calibrate their ruler — they adjust the exact value per photo.</div>
    <div style="display:flex;gap:10px;margin-top:6px;">
      <button class="btn btn-primary" id="submitCompBtn">Post competition</button>
      <button class="btn btn-ghost" id="cancelCompBtn">Cancel</button>
    </div>
  </div>`;

  document.getElementById('cancelCompBtn').onclick = ()=>{ state.view='list'; render(); };
  document.getElementById('submitCompBtn').onclick = async ()=>{
    const title = document.getElementById('cTitle').value.trim();
    const organizer = document.getElementById('cOrganizer').value.trim();
    const endDate = document.getElementById('cEnd').value;
    if(!title || !organizer || !endDate){ showToast('Please fill in a title, organizer name, and end date.', true); return; }
    const btn = document.getElementById('submitCompBtn');
    btn.disabled = true; btn.textContent = 'Posting…';
    try{
      const comp = await apiPost('/api/competitions', {
        title, organizer,
        species: document.getElementById('cSpecies').value.trim(),
        waterBody: document.getElementById('cWater').value.trim(),
        description: document.getElementById('cDesc').value.trim(),
        rules: document.getElementById('cRules').value.trim(),
        startDate: document.getElementById('cStart').value || todayISO(),
        endDate,
        refLabel: document.getElementById('cRefLabel').value.trim(),
        refUnit: document.getElementById('cUnit').value
      });
      if(!state.myName) saveMyName(organizer);
      state.view='detail'; state.compId=comp.id;
      render();
      showToast('Competition posted!');
    }catch(e){ showToast(e.message, true); btn.disabled=false; btn.textContent='Post competition'; }
  };
}

/* ---------- DETAIL ---------- */
async function renderDetail(){
  const root = document.getElementById('viewRoot');
  root.innerHTML = `<div id="detailBody">Loading…</div>`;
  let comp;
  try{ comp = await apiGet('/api/competitions/'+state.compId); }
  catch(e){ document.getElementById('detailBody').innerHTML = `<div class="empty-state panel">Competition not found.</div>`; return; }

  const db = document.getElementById('detailBody');
  const isOrganizer = state.myName && state.myName.toLowerCase()===comp.organizer.toLowerCase();
  const isJoined = state.myName && comp.participants.some(p=>p.name.toLowerCase()===state.myName.toLowerCase());
  const sortedEntries = comp.entries; // already sorted by API

  db.innerHTML = `
    <div class="detail-head">
      <div>
        <span class="status-pill ${comp.status==='open'?'status-open':'status-ended'}">${comp.status==='open'?'● Open':'Ended'}</span>
        <h2 style="margin:10px 0 6px;font-size:28px;">${escapeHtml(comp.title)}</h2>
        <div class="comp-meta">
          <span>🐟 ${escapeHtml(comp.species||'Any species')}</span>
          <span>📍 ${escapeHtml(comp.waterBody||'—')}</span>
          <span>🗓 ${fmtDate(comp.startDate)} → ${fmtDate(comp.endDate)}</span>
          <span>👤 Organized by ${escapeHtml(comp.organizer)}</span>
        </div>
      </div>
      ${comp.status==='open' && isOrganizer ? `<button class="btn btn-danger" id="endCompBtn">End competition & announce winner</button>` : ''}
    </div>

    ${comp.announcement ? `
    <div class="announcement">
      <h3>🏆 ${escapeHtml(comp.announcement.winner)} wins!</h3>
      <p>Winning catch: <span class="mono">${comp.announcement.length.toFixed(2)} ${comp.refLength.unit}</span> — posted to all ${comp.participants.length} angler${comp.participants.length===1?'':'s'} on ${fmtDate(comp.announcement.postedAt)}.</p>
      ${comp.announcement.message ? `<p style="margin-top:8px;">"${escapeHtml(comp.announcement.message)}"</p>` : ''}
    </div>` : ''}

    ${comp.description ? `<p style="color:var(--cream-dim);max-width:640px;">${escapeHtml(comp.description)}</p>` : ''}
    ${comp.rules ? `<details style="margin-top:8px;color:var(--cream-dim);font-size:13.5px;"><summary style="cursor:pointer;color:var(--sunrise-gold);">Rules</summary><p style="white-space:pre-wrap;">${escapeHtml(comp.rules)}</p></details>` : ''}

    <div class="section-title">Leaderboard</div>
    <div id="leaderboardWrap">${renderLeaderboard(sortedEntries, comp.refLength.unit)}</div>

    <div class="section-title">Anglers signed up (${comp.participants.length})</div>
    <div class="participants-list">
      ${comp.participants.length ? comp.participants.map(p=>`<span class="chip">${escapeHtml(p.name)}</span>`).join('') : '<span style="color:var(--cream-dim);font-size:13px;">No one yet — be the first to join.</span>'}
    </div>

    ${comp.status==='open' ? `
    <div class="section-title">Join & submit a catch</div>
    <div class="panel" style="margin-bottom:20px;">
      ${!isJoined ? `
        <label for="joinName">Sign up as</label>
        <div style="display:flex;gap:10px;">
          <input id="joinName" type="text" value="${escapeHtml(state.myName)}" placeholder="your name" style="margin-bottom:0;">
          <button class="btn btn-green" id="joinBtn">Join competition</button>
        </div>
      ` : `<p style="margin:0 0 14px;color:var(--dock-green);font-weight:600;">✓ You're signed up, ${escapeHtml(state.myName)}. Good luck out there.</p>
        <button class="btn btn-primary" id="openMeasureBtn">📷 Upload catch photo & measure</button>`}
    </div>
    <div id="measureArea"></div>
    ` : ''}
  `;

  if(comp.status==='open' && isOrganizer){
    document.getElementById('endCompBtn').onclick = ()=> endCompetition(comp);
  }
  if(comp.status==='open' && !isJoined){
    document.getElementById('joinBtn').onclick = async ()=>{
      const name = document.getElementById('joinName').value.trim();
      if(!name){ showToast('Enter a name to sign up.', true); return; }
      try{
        saveMyName(name);
        await apiPost('/api/competitions/'+comp.id+'/join', {name});
        showToast(`Signed up as ${name}!`);
        renderDetail();
      }catch(e){ showToast(e.message, true); }
    };
  }
  if(comp.status==='open' && isJoined){
    document.getElementById('openMeasureBtn').onclick = ()=> openMeasureTool(comp);
  }
}

function renderLeaderboard(entries, unit){
  if(entries.length===0) return `<div class="panel" style="text-align:center;color:var(--cream-dim);padding:30px;">No catches logged yet.</div>`;
  return `<div class="panel" style="overflow-x:auto;">
    <table class="leaderboard">
      <thead><tr><th>#</th><th>Photo</th><th>Angler</th><th>Estimated length</th><th>Submitted</th></tr></thead>
      <tbody>
        ${entries.map((e,i)=>`
          <tr>
            <td class="rank ${i===0?'gold':''}">${i+1}</td>
            <td><img src="${API}${e.imageUrl}" alt="Catch by ${escapeHtml(e.participant)}"></td>
            <td>${escapeHtml(e.participant)}</td>
            <td class="len-val">${e.length.toFixed(2)} ${unit}</td>
            <td class="mono" style="color:var(--cream-dim);font-size:12px;">${fmtDate(e.submittedAt)}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

async function endCompetition(comp){
  if(comp.entries.length===0){ showToast('No entries logged — nothing to crown yet.', true); return; }
  if(!confirm(`End "${comp.title}" and post the winner to all ${comp.participants.length} anglers? This can't be undone.`)) return;
  try{
    await apiPost('/api/competitions/'+comp.id+'/end', {requester: state.myName});
    showToast('Winner posted! 🏆');
    renderDetail();
  }catch(e){ showToast(e.message, true); }
}

/* ---------- MEASURING TOOL (client-side calibration, server-side storage) ---------- */
function openMeasureTool(comp){
  measure = { points:[], refLength:6, canvasEl:null, imgDataUrl:null, computedLength:null };
  const area = document.getElementById('measureArea');
  area.innerHTML = `
  <div class="panel">
    <h3 style="margin-top:0;">Measure your catch</h3>
    <div id="uploadStage">
      <label for="photoInput">Upload a photo of your fish laid next to a ruler</label>
      <input id="photoInput" type="file" accept="image/*">
      <div class="hint">Lay the fish flat alongside a ruler or tape measure in the same photo, shot from directly above for the most accurate estimate.</div>
    </div>
    <div id="calibrateStage" style="display:none;"></div>
  </div>`;

  document.getElementById('photoInput').onchange = (ev)=>{
    const file = ev.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=> setupCalibration(img, comp);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };
}

function setupCalibration(img, comp){
  document.getElementById('uploadStage').style.display='none';
  const stage = document.getElementById('calibrateStage');
  stage.style.display='block';

  const MAX_W = 800;
  const scale = Math.min(1, MAX_W / img.width);
  const cw = Math.round(img.width * scale);
  const ch = Math.round(img.height * scale);
  const offscreen = document.createElement('canvas');
  offscreen.width = cw; offscreen.height = ch;
  offscreen.getContext('2d').drawImage(img, 0, 0, cw, ch);
  measure.imgDataUrl = offscreen.toDataURL('image/jpeg', 0.85);
  measure.points = [];
  measure.refLength = 6;

  stage.innerHTML = `
    <div class="measure-wrap">
      <div class="measure-canvas-col"><canvas id="fishCanvas" width="${cw}" height="${ch}"></canvas></div>
      <div class="measure-side">
        <ol class="step-list" id="stepList"></ol>
        <label for="refLenInput">Reference length on ruler (${escapeHtml(comp.refLength.label)})</label>
        <input id="refLenInput" type="number" min="0.1" step="0.1" value="6">
        <div class="hint">Enter the real-world distance between the two ruler points you'll mark, in ${comp.refLength.unit==='in'?'inches':'centimeters'}.</div>
        <div id="resultArea"></div>
        <button class="btn btn-ghost btn-block" id="resetPointsBtn" style="margin-bottom:10px;">Reset points</button>
        <button class="btn btn-primary btn-block" id="submitEntryBtn" disabled>Submit to leaderboard</button>
      </div>
    </div>`;

  const canvas = document.getElementById('fishCanvas');
  measure.canvasEl = canvas;
  const ctx = canvas.getContext('2d');

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(offscreen, 0, 0);
    const labels = ['R1','R2','F1','F2'];
    const colors = ['#F0A94E','#F0A94E','#2F8F6E','#2F8F6E'];
    measure.points.forEach((p,i)=>{
      ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2); ctx.fillStyle = colors[i]; ctx.fill();
      ctx.strokeStyle = '#0B2438'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#EFE6CF'; ctx.font = 'bold 12px monospace'; ctx.fillText(labels[i], p.x+9, p.y-9);
    });
    if(measure.points.length>=2){
      ctx.beginPath(); ctx.moveTo(measure.points[0].x, measure.points[0].y); ctx.lineTo(measure.points[1].x, measure.points[1].y);
      ctx.strokeStyle = '#F0A94E'; ctx.lineWidth = 2; ctx.stroke();
    }
    if(measure.points.length>=4){
      ctx.beginPath(); ctx.moveTo(measure.points[2].x, measure.points[2].y); ctx.lineTo(measure.points[3].x, measure.points[3].y);
      ctx.strokeStyle = '#2F8F6E'; ctx.lineWidth = 2; ctx.stroke();
    }
  }
  draw();
  updateStepList();

  canvas.onclick = (e)=>{
    if(measure.points.length>=4) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX-rect.left) * (canvas.width/rect.width);
    const y = (e.clientY-rect.top) * (canvas.height/rect.height);
    measure.points.push({x,y});
    draw(); updateStepList();
    if(measure.points.length===4) computeLength(comp);
  };

  document.getElementById('resetPointsBtn').onclick = ()=>{
    measure.points = []; document.getElementById('resultArea').innerHTML='';
    document.getElementById('submitEntryBtn').disabled = true;
    draw(); updateStepList();
  };
  document.getElementById('refLenInput').oninput = (e)=>{
    measure.refLength = parseFloat(e.target.value)||0;
    if(measure.points.length===4) computeLength(comp);
  };
  document.getElementById('submitEntryBtn').onclick = ()=> submitEntry(comp);
}

function updateStepList(){
  const labels = ['Mark ruler point 1', 'Mark ruler point 2', 'Mark fish snout', 'Mark fish tail'];
  const n = measure.points.length;
  document.getElementById('stepList').innerHTML = labels.map((s,i)=>{
    const cls = i<n ? 'done' : (i===n ? 'active' : '');
    return `<li class="${cls}"><span class="step-num">${i<n?'✓':i+1}</span><span>${s}</span></li>`;
  }).join('');
}

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

function computeLength(comp){
  const [r1,r2,f1,f2] = measure.points;
  const rulerPx = dist(r1,r2), fishPx = dist(f1,f2);
  if(rulerPx<=0 || !measure.refLength){
    document.getElementById('resultArea').innerHTML = `<div class="hint" style="color:var(--danger);">Set a valid reference length and mark distinct points.</div>`;
    return;
  }
  const lengthVal = (fishPx/rulerPx) * measure.refLength;
  measure.computedLength = lengthVal;
  document.getElementById('resultArea').innerHTML = `<div class="result-box"><div class="num">${lengthVal.toFixed(2)}</div><div class="lbl">estimated length (${comp.refLength.unit})</div></div>`;
  document.getElementById('submitEntryBtn').disabled = false;
}

function dataUrlToBlob(dataUrl){
  const [meta, b64] = dataUrl.split(',');
  const mime = meta.match(/:(.*?);/)[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}

async function submitEntry(comp){
  if(!measure.computedLength || measure.points.length<4) return;
  const btn = document.getElementById('submitEntryBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  try{
    const form = new FormData();
    form.append('participant', state.myName);
    form.append('length', measure.computedLength.toFixed(3));
    form.append('image', dataUrlToBlob(measure.imgDataUrl), 'catch.jpg');
    await apiPostForm('/api/competitions/'+comp.id+'/entries', form);
    showToast('Catch logged to the leaderboard!');
    renderDetail();
  }catch(e){
    showToast(e.message, true);
    btn.disabled = false; btn.textContent = 'Submit to leaderboard';
  }
}

init();
</script>
</body>
</html>
